</style>
<div class="ajora-tc" id="ajora-tc">
  <div class="ajora-tc-group">
    <div class="ajora-tc-btn" data-key="65" data-mode="hold">&#8592;</div>
    <div class="ajora-tc-btn" data-key="68" data-mode="hold">&#8594;</div>
  </div>
  <div class="ajora-tc-group">
    <div class="ajora-tc-btn ajora-tc-fire" data-key="90" data-mode="hold" style="font-size:12px;">PLAY</div>
    <div class="ajora-tc-btn ajora-tc-fire" data-key="87" data-mode="hold">JUMP</div>
  </div>
</div>
<script>
(function(){
  function dispatchKey(type, code){
    var ev = new KeyboardEvent(type, {bubbles:true, cancelable:true});
    try{
      Object.defineProperty(ev,'keyCode',{get:function(){return code;}});
      Object.defineProperty(ev,'which',{get:function(){return code;}});
    }catch(e){}
    document.dispatchEvent(ev);
  }
  function bind(el){
    var code = parseInt(el.getAttribute('data-key'),10);
    var mode = el.getAttribute('data-mode');
    var timer = null;
    function press(e){
      e.preventDefault();
      el.classList.add('active');
      dispatchKey('keydown', code);
      if(mode==='repeat'){ timer = setInterval(function(){dispatchKey('keydown', code);}, 60); }
    }
    function release(e){
      if(e) e.preventDefault();
      el.classList.remove('active');
      if(timer){ clearInterval(timer); timer=null; }
      if(mode==='hold' || mode==='repeat'){ dispatchKey('keyup', code); }
    }
    el.addEventListener('touchstart', press, {passive:false});
    el.addEventListener('touchend', release, {passive:false});
    el.addEventListener('touchcancel', release, {passive:false});
  }
  document.querySelectorAll('#ajora-tc .ajora-tc-btn').forEach(bind);
})();
</script>
