<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Chess | Ajora Games</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta
          name="description"           
          content="A simple chess AI.">

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" 
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" 
            integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" 
            crossorigin="anonymous">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="css/main.css">

        <!-- Google Icons (Material Design) -->
        <link rel="stylesheet" 
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            crossorigin="anonymous">

        <!-- jQuery --> 
        <script
            src="https://code.jquery.com/jquery-3.5.1.js"
            integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc="
            crossorigin="anonymous">
        </script>

        <!-- Chessboard JS -->
        <link rel="stylesheet"
            href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
            integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU"
            crossorigin="anonymous">
        <script defer src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
            integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
            crossorigin="anonymous"></script>

        <!-- Chess JS (slightly modified) -->
        <script defer src="js/chess.js"></script>
        </script>

        <!-- Bootstrap JS --> 
        <script defer
            src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js" 
            integrity="sha384-6khuMg9gaYr5AxOqhkVIODVIvm9ynTT5J4V1cfthmT+emCG6yVmEZsRHdxlotUnm" 
            crossorigin="anonymous">
        </script>

        <!-- Custom JS -->
        <script defer src="js/main.js"></script>
    </head>
    <body>
<div id="ajora-intro" style="position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2147483647;overflow:hidden">
  <div style="position:absolute;inset:0;opacity:.5;background:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.05%22/%3E%3C/svg%3E');pointer-events:none"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,transparent 20%,rgba(8,8,8,0.9) 100%);pointer-events:none"></div>
  <div id="ai-glow" style="position:absolute;width:500px;height:250px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,175,55,0.28) 0%,transparent 70%);filter:blur(40px);opacity:0;transition:opacity 1.2s ease .6s;pointer-events:none"></div>

  <div id="ai-logos" style="display:flex;align-items:center;justify-content:center;gap:24px;opacity:0;transform:scale(0.92) translateY(14px);transition:all .85s cubic-bezier(.34,1.1,.64,1)">
    <img src="../ajora-logo-transparent.png" alt="Ajora Games" style="height:min(64px,13vw);width:min(64px,13vw);object-fit:contain;display:block"/>
    <div style="width:1px;height:min(48px,10vw);background:linear-gradient(180deg,transparent,rgba(212,175,55,0.7),transparent);flex-shrink:0"></div>
    <img src="../games/chess-logo.svg" alt="Chess" style="height:min(64px,13vw);width:min(64px,13vw);object-fit:contain;display:block;border-radius:16px;box-shadow:0 0 24px rgba(212,175,55,0.35)"/>
  </div>

  <div id="ai-title" style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-weight:800;font-size:15px;color:#e8e8ec;letter-spacing:.04em;margin-top:22px;opacity:0;transition:opacity .5s ease .68s">Chess</div>
  <div id="ai-sub" style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-weight:600;font-size:10px;color:#606068;letter-spacing:.2em;text-transform:uppercase;margin-top:6px;opacity:0;transition:opacity .5s ease .74s">An Ajora Games Title</div>

  <div id="ai-bar" style="width:min(160px,44vw);height:6px;background:#1a1a22;border-radius:8px;margin-top:30px;overflow:hidden;opacity:0;transition:opacity .3s ease .82s">
    <div id="ai-progress" style="height:100%;width:0%;background:#D4AF37;transition:width 1.1s ease .92s;border-radius:8px"></div>
  </div>
</div>
<script>
(function(){
  var logos=document.getElementById('ai-logos');
  var glow=document.getElementById('ai-glow');
  var title=document.getElementById('ai-title');
  var sub=document.getElementById('ai-sub');
  var bar=document.getElementById('ai-bar');
  var prog=document.getElementById('ai-progress');
  setTimeout(function(){ if(logos){logos.style.opacity='1';logos.style.transform='scale(1) translateY(0)';} },120);
  setTimeout(function(){ if(glow)glow.style.opacity='1'; },450);
  setTimeout(function(){ if(title)title.style.opacity='1'; },650);
  setTimeout(function(){ if(sub)sub.style.opacity='1'; },720);
  setTimeout(function(){ if(bar)bar.style.opacity='1'; },800);
  setTimeout(function(){ if(prog)prog.style.width='100%'; },840);
  setTimeout(function(){
    var intro=document.getElementById('ajora-intro');
    if(!intro)return;
    intro.style.transition='opacity .45s ease';
    intro.style.opacity='0';
    setTimeout(function(){ intro.style.display='none'; },450);
  },2100);
})();
</script>

        <main>
            <div class="container my-3">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h1 class="text-align-center">Simple Chess AI</h1>
                        <div class="row justify-content-center">
                            <span id="position-count">0</span> &nbsp positions evaluated in &nbsp <span id="time">0</span>s.
                        </div>
                        <div class="row mb-3 justify-content-center">
                            That's &nbsp <span id="positions-per-s">0</span> &nbsp positions / s.
                        </div>
                        <div id="accordion">
                            <div class="card">
                                <div class="card-header" id="settingsHeading">
                                    <h2 class="text-align-center">
                                        <button class="btn btn-header no-outline" data-toggle="collapse" data-target="#settings" aria-expanded="true" aria-controls="settings">
                                            Settings
                                        </button>
                                    </h2>
                                </div>
                            </div>
                            <div id="settings" class="collapse" aria-labelledby="settingsHeading" data-parent="#accordion">
                                <div class="card-body">
                                    <div class="row align-items-center justify-content-center">
                                        <div class="form-group">
                                            <label for="search-depth">Search Depth (Black):</label>
                                            <select id="search-depth">
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3" selected>3</option>
                                                <option value="4">4</option>
                                                <option value="5">5</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row align-items-center justify-content-center">
                                        <div class="form-group">
                                            <label for="search-depth-white">Search Depth (White):</label>
                                            <select id="search-depth-white">
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3" selected>3</option>
                                                <option value="4">4</option>
                                                <option value="5">5</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row align-items-center justify-content-center">
                                        <div class="form-group">
                                            <input type="checkbox" id="showHint" name="showHint" value="showHint">
                                            <label for="showHint">Show Suggested Move (White)</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="card-header" id="openingPositionsHeading">
                                    <h2 class="text-align-center">
                                        <button class="btn btn-header no-outline" data-toggle="collapse" data-target="#openingPositions" aria-expanded="true" aria-controls="openingPositions">
                                            Opening Positions
                                        </button>
                                    </h2>
                                </div>
                            </div>
                            <div id="openingPositions" class="collapse" aria-labelledby="openingPositionsHeading" data-parent="#accordion">
                                <div class="card-body">
                                    <div class="row my-3 text-align-center">
                                        <div class="col-md-6 my-2">
                                            <button class="btn btn-primary" id="ruyLopezBtn">Ruy Lopez</button>
                                        </div>
                                        <div class="col-md-6 my-2">
                                            <button class="btn btn-primary" id="italianGameBtn">Italian Game</button>
                                        </div>
                                    </div>
                                    <div class="row my-3 text-align-center">
                                        <div class="col-md-6 my-2">
                                            <button class="btn btn-primary" id="sicilianDefenseBtn">Sicilian Defense</button>
                                        </div>
                                        <div class="col-md-6 my-2">
                                            <button class="btn btn-primary" id="startBtn">Start Position</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="card-header" id="compVsCompHeading">
                                    <h2 class="text-align-center">
                                        <button class="btn btn-header no-outline" data-toggle="collapse" data-target="#compVsComp" aria-expanded="true" aria-controls="compVsComp">
                                            Computer vs. Computer
                                        </button>
                                    </h2>
                                </div>
                            </div>
                        </div>
                        <div id="compVsComp" class="collapse" aria-labelledby="compVsCompHeading" data-parent="#accordion">
                            <div class="card-body">
                                <div class="row text-align-center">
                                    <div class="col-md-6 my-2">
                                        <button class="btn btn-success" id="compVsCompBtn">Start Game</button>
                                    </div>
                                    <div class="col-md-6 my-2">
                                        <button class="btn btn-danger" id="resetBtn">Stop and Reset</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row my-3 text-align-center">
                            <div class="col-md-12">
                                <h2>Advantage</h2>
                                <p><span id="advantageColor">Neither side</span> has the advantage 
                                    (+<span id="advantageNumber">0</span>).</p>
                                <div class="progress">
                                    <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" 
                                        role="progressbar" aria-valuenow="0" style="width: 50%"
                                        aria-valuemin="-2000" aria-valuemax="4000" id='advantageBar'>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row my-3 text-align-center">
                            <div class="col-md-12">
                                <h2>Status</h2>
                                <p><span id="status">No check, checkmate, or draw.</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div id="myBoard"></div>
                        <div class="row my-3 text-align-center">
                            <div class="col-md-6 my-2">
                                <button class="btn btn-danger" id="undoBtn">Undo</button>
                            </div>
                            <div class="col-md-6 my-2">
                                <button class="btn btn-success" id="redoBtn">Redo</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p class="text-align-center"> Copyright &copy 2020 
                <a href="https://github.com/zeyu2001/chess-ai">Zhang Zeyu</a> 
            </p>
        </footer>
    
<a href="../games/" id="ajora-back-badge" style="position:fixed;top:14px;right:14px;z-index:2147483647;display:flex;align-items:center;gap:7px;background:rgba(8,8,8,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.14);border-radius:999px;padding:6px 14px 6px 6px;text-decoration:none;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:12px;font-weight:600;letter-spacing:.02em;color:#e8e8ec;opacity:.78;transition:opacity .15s ease,background .15s ease;line-height:1;" onmouseover="this.style.opacity='1';this.style.background='rgba(8,8,8,0.9)'" onmouseout="this.style.opacity='.78';this.style.background='rgba(8,8,8,0.72)'">
  <img src="../ajora-logo-transparent.png" alt="" style="width:18px;height:18px;object-fit:contain;border-radius:5px;display:block;pointer-events:none"/>
  <span style="pointer-events:none">Ajora Games</span>
</a>

</body>
</html>
