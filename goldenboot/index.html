<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --turf-light:#123420;
  --ink:#0d0c0c;
  --chalk:#ede7dc;
  --chalk-dim:#b9b3a4;
  --gold:#ffb020;
  --gold-deep:#d99312;
  --red:#c81d3a;
  --yellow:#ffd23f;
  --floodlight:rgba(234,246,255,0.08);
}
html,body{height:100%;background:var(--turf-dark);overflow-x:hidden}
body{
  font-family:'Space Mono',monospace;
  color:var(--chalk);
  min-height:100vh;
  display:flex;flex-direction:column;
  background:

    radial-gradient(ellipse 90% 55% at 80% -10%,var(--floodlight),transparent 60%),
    repeating-linear-gradient(90deg,var(--turf) 0px,var(--turf) 64px,var(--turf-light) 64px,var(--turf-light) 128px),

  position:relative;
}
h1,h2,h3,.display{font-family:'Big Shoulders Display',sans-serif;font-weight:900;letter-spacing:.01em}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;flex-shrink:0;position:relative;z-index:50;
  background:rgba(13,12,12,0.55);
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(237,231,220,0.1);
}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--chalk)}
.nav-logo img{height:28px;width:28px;object-fit:contain;border-radius:8px}
.nav-logo-name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.nav-right{display:flex;align-items:center;gap:14px}
.game-logo{display:flex;align-items:center;gap:8px}
.game-logo img{height:28px;width:28px;object-fit:contain;border-radius:8px}
.game-logo-name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:12px;letter-spacing:.03em;color:var(--gold);line-height:1.05}
.nav-back{
  font-family:'Space Mono',monospace;font-weight:700;font-size:11px;color:var(--chalk-dim);text-decoration:none;
  letter-spacing:.03em;padding:6px 14px;border-radius:3px;border:1px solid rgba(237,231,220,0.25);
  transition:color .2s,border-color .2s,transform .15s;
}
.nav-back:hover{color:var(--gold);border-color:var(--gold);transform:translateY(-1px)}
@media(max-width:640px){.game-logo-name,.nav-logo-name{display:none}nav{padding:10px 14px}}

/* SCOREBOARD STRIP */
#scoreboard{
  display:flex;align-items:center;justify-content:center;gap:0;
  flex-shrink:0;position:relative;z-index:20;padding:14px 16px 0;
}
.sb-block{
  background:rgba(13,12,12,0.6);border:1px solid rgba(237,231,220,0.14);
  padding:8px 20px;text-align:center;min-width:88px;
}
.sb-block:first-child{border-radius:6px 0 0 6px;border-right:none}
.sb-block:last-child{border-radius:0 6px 6px 0;border-left:none}
.sb-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--chalk-dim)}
.sb-value{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:24px;color:var(--gold);line-height:1.2}
#sb-progress{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:24px;color:var(--chalk)}

/* MAIN / CARD */
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;position:relative;min-height:0}

#timer-wrap{position:relative;width:88px;height:88px;margin-bottom:6px;flex-shrink:0}
#timer-wrap svg{transform:rotate(-90deg)}
#timer-bg{fill:none;stroke:rgba(237,231,220,0.14);stroke-width:6}
#timer-arc{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;stroke-dasharray:251.2;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .2s}
#timer-arc.low{stroke:var(--red)}
#timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:28px;color:var(--chalk)}

.eyebrow{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  background:rgba(255,176,32,0.1);border:1px solid rgba(255,176,32,0.35);
  padding:5px 14px;border-radius:20px;margin-bottom:16px;
}

#ticket{
  width:100%;max-width:560px;
  background:var(--chalk);color:var(--ink);
  border-radius:14px;
  padding:30px 26px 24px;
  position:relative;
  box-shadow:0 20px 50px rgba(0,0,0,0.45),0 0 0 1px rgba(0,0,0,0.06);
}
#ticket::before,#ticket::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:26px;height:26px;background:var(--turf-dark);border-radius:50%;
}
#ticket::before{left:-13px}
#ticket::after{right:-13px}
#q-text{
  font-family:'Big Shoulders Display',sans-serif;font-weight:800;
  font-size:clamp(20px,3.4vw,28px);line-height:1.22;margin-bottom:22px;
  min-height:2.4em;display:flex;align-items:center;
}
#answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){#answers{grid-template-columns:1fr}}
.ans{
  font-family:'Space Mono',monospace;font-weight:700;font-size:13.5px;text-align:left;
  background:#fff;border:2px solid rgba(13,12,12,0.14);border-radius:8px;
  padding:13px 16px;cursor:pointer;color:var(--ink);position:relative;
  transition:border-color .15s,transform .12s,background .15s;
  display:flex;align-items:center;gap:10px;
}
.ans:hover:not(.locked){border-color:var(--gold-deep);transform:translateY(-1px)}
.ans .num{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:15px;color:var(--chalk-dim);flex-shrink:0}
.ans.correct{background:#e6f7ec;border-color:#2e9e5b;color:#1b6b3c}
.ans.correct .num{color:#2e9e5b}
.ans.wrong{background:#fbe6e9;border-color:var(--red);color:#9c1428}
.ans.wrong .num{color:var(--red)}
.ans.locked{cursor:default}

#next-btn{
  margin-top:24px;padding:13px 40px;background:var(--gold);color:var(--ink);
  font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:15px;letter-spacing:.03em;
  border:none;border-radius:6px;cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .15s;text-transform:uppercase;
}
#next-btn.show{opacity:1;pointer-events:all}
#next-btn:hover{transform:translateY(-2px)}

/* CARD FLASH overlay - referee card feedback */
#card-flash{
  position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0;
  display:flex;align-items:center;justify-content:center;
}
#card-flash .card-shape{
  width:120px;height:170px;border-radius:8px;transform:scale(0.4) rotate(-8deg);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
#card-flash.yellow{background:rgba(255,210,63,0.12)}
#card-flash.yellow .card-shape{background:var(--yellow)}
#card-flash.green{background:rgba(46,158,91,0.1)}
#card-flash.green .card-shape{background:#2e9e5b;width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#card-flash.show{animation:cardFlash .7s ease forwards}
@keyframes cardFlash{
  0%{opacity:0}
  15%{opacity:1}
  15%{transform:none}
  30%{}
  100%{opacity:0}
}
#card-flash.show .card-shape{animation:cardPop .7s cubic-bezier(.34,1.4,.4,1) forwards}
@keyframes cardPop{
  0%{transform:scale(0.3) rotate(-10deg)}
  40%{transform:scale(1.08) rotate(3deg)}
  60%{transform:scale(1) rotate(0)}
  100%{transform:scale(1) rotate(0)}
}

/* END SCREEN */
#gameover{
  position:fixed;inset:0;background:rgba(10,32,21,0.97);z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;
}
#gameover.show{display:flex}
.go-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.go-title{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(38px,8vw,64px);line-height:.95;color:var(--chalk);margin-bottom:6px}
.go-title span{color:var(--gold)}
.go-score{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(70px,16vw,120px);color:var(--gold);line-height:1;margin:14px 0 4px}
.go-sub{font-size:12px;color:var(--chalk-dim);margin-bottom:26px}
.go-stats{display:flex;gap:28px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.go-stat-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--chalk-dim)}
.go-stat-val{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:22px;color:var(--chalk)}
.go-play-btn{
  padding:15px 46px;background:var(--gold);color:var(--ink);border:none;border-radius:6px;
  font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:15px;letter-spacing:.03em;
  text-transform:uppercase;cursor:pointer;transition:transform .15s;

.go-play-btn:hover{transform:translateY(-2px)}
.go-back-link{margin-top:16px;font-size:11px;color:var(--chalk-dim);text-decoration:none;letter-spacing:.03em}
.go-back-link:hover{color:var(--gold)}

const ROUND_SIZE=15, TIME_PER_Q=10, CIRC=251.2;
let round=[], idx=0, score=0, streak=0, bestStreak=0, locked=false, timerId=null, timeLeft=TIME_PER_Q;
const best = { get(){ try{return parseInt(localStorage.getItem('gbt_best')||'0',10)}catch(e){return 0} },
               set(v){ try{localStorage.setItem('gbt_best',String(v))}catch(e){} } };

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame(){
  document.getElementById('gameover').classList.remove('show');
  round = shuffle(QUESTIONS).slice(0,ROUND_SIZE).map(q=>{
    const opts = q.o.map((text,i)=>({text,correct:i===q.c}));
    return {cat:q.cat, q:q.q, opts:shuffle(opts)};
  });
  idx=0; score=0; streak=0; bestStreak=0;
  document.getElementById('sb-best').textContent = best.get();
  updateScoreboard();
  loadQuestion();
}

function updateScoreboard(){
  document.getElementById('sb-score').textContent=score;
  document.getElementById('sb-streak').textContent=streak;
  document.getElementById('sb-q').textContent=Math.min(idx+1,ROUND_SIZE);
}

function loadQuestion(){
  if(idx>=round.length){ endGame(); return; }
  locked=false;
  const item=round[idx];
  document.getElementById('q-category').textContent=item.cat;
  document.getElementById('q-text').textContent=item.q;
  updateScoreboard();

  const wrap=document.getElementById('answers');
  wrap.innerHTML='';
  item.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='ans';
    btn.innerHTML='<span class="num">'+String.fromCharCode(65+i)+'</span><span>'+opt.text+'</span>';
    btn.onclick=()=>selectAnswer(btn,opt.correct);
    wrap.appendChild(btn);
  });

  document.getElementById('next-btn').classList.remove('show');
  startTimer();
}

function startTimer(){
  clearInterval(timerId);
  timeLeft=TIME_PER_Q;
  const arc=document.getElementById('timer-arc'), num=document.getElementById('timer-num');
  arc.classList.remove('low');
  arc.style.transition='none';
  arc.style.strokeDashoffset='0';
  num.textContent=timeLeft;
  requestAnimationFrame(()=>{ arc.style.transition='stroke-dashoffset 1s linear,stroke .2s'; });
  timerId=setInterval(()=>{
    timeLeft--;
    num.textContent=Math.max(timeLeft,0);
    arc.style.strokeDashoffset=(CIRC*(1-timeLeft/TIME_PER_Q));
    if(timeLeft<=3) arc.classList.add('low');
    if(timeLeft<=0){ clearInterval(timerId); timeUp(); }
  },1000);
}

function timeUp(){
  if(locked)return;
  locked=true;
  const wrap=document.getElementById('answers');
  [...wrap.children].forEach(b=>b.classList.add('locked'));
  const correctIdx = round[idx].opts.findIndex(o=>o.correct);
  wrap.children[correctIdx].classList.add('correct');
  streak=0;
  flashCard('red');
  document.getElementById('next-btn').classList.add('show');
  idx++;
}

function selectAnswer(btn,isCorrect){
  if(locked)return;
  locked=true;
  clearInterval(timerId);
  const wrap=document.getElementById('answers');
  [...wrap.children].forEach(b=>b.classList.add('locked'));

  if(isCorrect){
    btn.classList.add('correct');
    score++; streak++; if(streak>bestStreak) bestStreak=streak;
    flashCard('green');
  } else {
    btn.classList.add('wrong');
    const correctIdx = round[idx].opts.findIndex(o=>o.correct);
    wrap.children[correctIdx].classList.add('correct');
    streak=0;
    flashCard('red');
  }
  updateScoreboard();
  document.getElementById('next-btn').classList.add('show');
  idx++;
}

function flashCard(type){
  // type: 'green' (correct), 'yellow' (wrong pick), 'red' (timed out)
  const el=document.getElementById('card-flash');
  const shape=el.querySelector('.card-shape');
  el.className='';
  void el.offsetWidth;
  if(type==='green'){
    el.classList.add('green','show');
    shape.style.background='';
  } else {
    el.classList.add('yellow','show');
    shape.style.background = type==='red' ? '#c81d3a' : '';
  }
  setTimeout(()=>{ el.classList.remove('show'); },750);
}

function nextQuestion(){ loadQuestion(); }

function endGame(){
  clearInterval(timerId);
  const acc = Math.round((score/round.length)*100);
  const prevBest = best.get();
  const newBest = Math.max(prevBest, score);
  best.set(newBest);

  document.getElementById('go-score').textContent = score+'/'+round.length;
  document.getElementById('go-streak').textContent = bestStreak;
  document.getElementById('go-acc').textContent = acc+'%';
  document.getElementById('go-best').textContent = newBest+'/'+round.length;
  document.getElementById('go-sub').textContent = score===round.length ? "Perfect round — clean sheet!" : (acc>=70 ? "Solid performance out there." : "Room to improve before the next matchday.");
  document.getElementById('gameover').classList.add('show');
}

function showIntro(){
  const logos=document.getElementById('intro-logos');
  const glow=document.getElementById('intro-glow');
  const sub=document.getElementById('intro-sub');
  const bar=document.getElementById('intro-bar');
  const prog=document.getElementById('intro-progress');

  setTimeout(()=>{ if(logos){logos.style.opacity='1';logos.style.transform='scale(1) translateY(0)';} },150);
  setTimeout(()=>{ if(glow)glow.style.opacity='1'; },500);
  setTimeout(()=>{ if(sub)sub.style.opacity='1'; },700);
  setTimeout(()=>{ if(bar)bar.style.opacity='1'; },880);
  setTimeout(()=>{ if(prog)prog.style.width='100%'; },920);
  setTimeout(()=>{
    const intro=document.getElementById('page-intro');
    intro.style.transition='opacity .5s ease';
    intro.style.opacity='0';
    setTimeout(()=>{intro.style.display='none';startGame();},500);
  },2600);
}

showIntro();
</script>
