<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B3C26" />
      <stop offset="100%" stop-color="#2E081B" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#39ff5a" stroke-width="4" stroke-opacity="0.25" />

  <g transform="translate(256, 230)">
    <path d="M -90,10 L 0,-80 L 90,10 Z" fill="#39ff5a" filter="url(#neonGlow)" />
    <path d="M -90,10 L 0,-80 L 90,10 Z" fill="#ffffff" opacity="0.3" />

    <path d="M -90,50 L 0,140 L 90,50 Z" fill="#FF436A" />
    
    <line x1="-120" y1="30" x2="120" y2="30" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.15" />
  </g>

  <text x="256" y="445" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="36" 
        letter-spacing="9" 
        opacity="0.9">HIGHER</text>
        
  <text x="256" y="475" 
        text-anchor="middle" 
        fill="#39ff5a" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="22" 
        letter-spacing="14" 
        filter="url(#neonGlow)">OR LOWER</text>
</svg>
