<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a170f" />
      <stop offset="100%" stop-color="#020a05" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#4ADE80" stroke-width="4" stroke-opacity="0.25" />
  <g filter="url(#glow)">
    <rect x="146" y="196" width="52" height="52" rx="8" fill="#4ADE80"/>
    <rect x="204" y="196" width="52" height="52" rx="8" fill="#4ADE80"/>
