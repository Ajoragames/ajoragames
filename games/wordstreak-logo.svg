  </g>
  <text x="172" y="232" text-anchor="middle" fill="#0d0c0c" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="30">A</text>
  <text x="230" y="232" text-anchor="middle" fill="#0d0c0c" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="30">J</text>
  <text x="288" y="232" text-anchor="middle" fill="#0d0c0c" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="30">O</text>
  <text x="346" y="232" text-anchor="middle" fill="#ede7dc" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="30">?</text>
