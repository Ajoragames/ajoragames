  </g>
  <text x="256" y="445" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="32" letter-spacing="8" opacity="0.9">CANDY</text>
  <text x="256" y="475" text-anchor="middle" fill="#FF4FA3" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="22" letter-spacing="12" filter="url(#glow)">MATCH</text>
