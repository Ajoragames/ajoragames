  <text x="256" y="475" text-anchor="middle" fill="#39ff5a" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="22" letter-spacing="0" filter="url(#glow)"></text>
