  <text x="256" y="445" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="32" letter-spacing="8" opacity="0.9">BRICK</text>
  <text x="256" y="475" text-anchor="middle" fill="#39ff5a" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="22" letter-spacing="14" filter="url(#glow)">GAME</text>
