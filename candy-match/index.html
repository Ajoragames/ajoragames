<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Candy Match | Ajora Games</title>
<meta name="description" content="Swap and match colorful candies in rows and columns to rack up combos before you run out of moves."/>
<style>
  :root{ --bg:#0a0a0d; --panel:#121216; --line:#232329; --fg:#e8e8ec; --mu:#606068; --green:#3ddc84; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  #wrap{display:flex;flex-direction:column;align-items:center;padding:20px 12px 60px;gap:14px;}
  header{text-align:center;}
  h1{font-weight:800;font-size:15px;letter-spacing:.04em;}
  .sub{font-weight:600;font-size:10px;color:var(--mu);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
  #hud{display:flex;gap:28px;align-items:baseline;}
  #hud .lbl{font-size:9px;color:var(--mu);letter-spacing:.15em;text-transform:uppercase;}
  #hud .val{font-size:22px;font-weight:800;color:var(--green);}
  #board{
    display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    width:min(92vw,384px); height:min(92vw,384px);
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:4px; gap:3px;
  }
  .candy{border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; transition:transform .12s; user-select:none;}
  .candy.selected{transform:scale(.85); box-shadow:0 0 0 2px #fff inset;}
  .candy.matched{animation:pop .25s forwards;}
  @keyframes pop{ to{ transform:scale(0); opacity:0; } }
  #hint{font-size:11px;color:var(--mu);text-align:center;max-width:380px;line-height:1.5;}
  #overlay{position:fixed;inset:0;background:rgba(10,10,13,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:22px;font-weight:800;}
  #overlay p{font-size:12px;color:var(--mu);}
  button{background:var(--green);color:#04140b;border:none;border-radius:8px;padding:10px 22px;font-weight:800;font-size:13px;cursor:pointer;}
  button:active{transform:scale(.97);}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Candy Match</h1>
    <div class="sub">An Ajora Games Title</div>
  </header>
  <div id="hud">
    <div><div class="lbl">Score</div><div class="val" id="scoreVal">0</div></div>
    <div><div class="lbl">Moves</div><div class="val" id="movesVal">20</div></div>
    <div><div class="lbl">Best</div><div class="val" id="bestVal">0</div></div>
  </div>
  <div id="board"></div>
  <div id="hint">Tap a candy, then tap a neighbor to swap. Match 3 or more in a row or column.</div>
</div>

<div id="overlay">
  <h2>Out of Moves</h2>
  <p id="finalScore"></p>
  <button id="restartBtn">Play Again</button>
</div>

<script>
(function(){
  const SIZE = 8;
  const CANDIES = [
    {emoji:'🍬', color:'#ff5d7a'},
    {emoji:'🍭', color:'#4aa8ff'},
    {emoji:'🍩', color:'#ff9f4a'},
    {emoji:'🍇', color:'#c47bff'},
    {emoji:'🍋', color:'#e8d24a'},
    {emoji:'🍏', color:'#3ddc84'},
  ];

  let grid, score, best, moves, selected, busy;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('scoreVal');
  const movesEl = document.getElementById('movesVal');
  const bestEl = document.getElementById('bestVal');

  function loadBest(){ try{ return parseInt(localStorage.getItem('cm_best')||'0'); }catch(e){ return 0; } }
  function saveBest(v){ try{ localStorage.setItem('cm_best', v); }catch(e){} }

  function randCandy(){ return Math.floor(Math.random()*CANDIES.length); }

  function makeGrid(){
    const g = [];
    for (let r=0;r<SIZE;r++){
      g.push([]);
      for (let c=0;c<SIZE;c++){
        let v;
        do { v = randCandy(); }
        while (
          (c>=2 && g[r][c-1]===v && g[r][c-2]===v) ||
          (r>=2 && g[r-1][c]===v && g[r-2][c]===v)
        );
        g[r].push(v);
      }
    }
    return g;
  }

  function buildDom(){
    boardEl.innerHTML = '';
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const d = document.createElement('div');
        d.className = 'candy';
        d.dataset.r = r; d.dataset.c = c;
        d.addEventListener('click', () => onCellClick(r,c));
        boardEl.appendChild(d);
      }
    }
  }

  function cellEl(r,c){ return boardEl.children[r*SIZE+c]; }

  function render(){
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const el = cellEl(r,c);
        const v = grid[r][c];
        el.textContent = v === null ? '' : CANDIES[v].emoji;
        el.style.background = v === null ? 'transparent' : CANDIES[v].color + '22';
        el.classList.remove('selected');
      }
    }
    if (selected){
      cellEl(selected[0], selected[1]).classList.add('selected');
    }
  }

  function isAdjacent(a,b){
    const dr = Math.abs(a[0]-b[0]), dc = Math.abs(a[1]-b[1]);
    return (dr+dc) === 1;
  }

  function swap(a,b){
    const tmp = grid[a[0]][a[1]];
    grid[a[0]][a[1]] = grid[b[0]][b[1]];
    grid[b[0]][b[1]] = tmp;
  }

  function findMatches(){
    const matched = Array.from({length:SIZE}, () => Array(SIZE).fill(false));
    // rows
    for (let r=0;r<SIZE;r++){
      let runStart = 0;
      for (let c=1;c<=SIZE;c++){
        if (c<SIZE && grid[r][c] !== null && grid[r][c] === grid[r][runStart]){
          continue;
        }
        const runLen = c - runStart;
        if (runLen >= 3 && grid[r][runStart] !== null){
          for (let k=runStart;k<c;k++) matched[r][k] = true;
        }
        runStart = c;
      }
    }
    // cols
    for (let c=0;c<SIZE;c++){
      let runStart = 0;
      for (let r=1;r<=SIZE;r++){
        if (r<SIZE && grid[r][c] !== null && grid[r][c] === grid[runStart][c]){
          continue;
        }
        const runLen = r - runStart;
        if (runLen >= 3 && grid[runStart][c] !== null){
          for (let k=runStart;k<r;k++) matched[k][c] = true;
        }
        runStart = r;
      }
    }
    return matched;
  }

  function countMatched(matched){
    let n = 0;
    for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (matched[r][c]) n++;
    return n;
  }

  async function resolveBoard(){
    busy = true;
    let totalCleared = 0;
    let combo = 0;
    while (true){
      const matched = findMatches();
      const n = countMatched(matched);
      if (n === 0) break;
      combo++;
      totalCleared += n;

      for (let r=0;r<SIZE;r++){
        for (let c=0;c<SIZE;c++){
          if (matched[r][c]) cellEl(r,c).classList.add('matched');
        }
      }
      await sleep(220);

      for (let r=0;r<SIZE;r++){
        for (let c=0;c<SIZE;c++){
          if (matched[r][c]) grid[r][c] = null;
        }
      }

      dropAndFill();
      render();
      await sleep(160);
    }
    score += totalCleared * 10 * Math.max(1, combo);
    if (score > best){ best = score; saveBest(best); }
    updateHud();
    busy = false;
    return totalCleared > 0;
  }

  function dropAndFill(){
    for (let c=0;c<SIZE;c++){
      let write = SIZE-1;
      for (let r=SIZE-1;r>=0;r--){
        if (grid[r][c] !== null){
          grid[write][c] = grid[r][c];
          if (write !== r) grid[r][c] = null;
          write--;
        }
      }
      for (let r=write;r>=0;r--){
        grid[r][c] = randCandy();
      }
    }
  }

  function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

  async function onCellClick(r,c){
    if (busy || moves <= 0) return;
    if (!selected){
      selected = [r,c];
      render();
      return;
    }
    if (selected[0]===r && selected[1]===c){
      selected = null; render(); return;
    }
    if (!isAdjacent(selected, [r,c])){
      selected = [r,c];
      render();
      return;
    }
    const a = selected, b = [r,c];
    selected = null;
    swap(a,b);
    render();
    const matched = findMatches();
    if (countMatched(matched) === 0){
      await sleep(180);
      swap(a,b);
      render();
      return;
    }
    moves--;
    updateHud();
    await resolveBoard();
    if (moves <= 0) endGame();
  }

  function updateHud(){
    scoreEl.textContent = score;
    movesEl.textContent = moves;
    bestEl.textContent = best;
  }

  function endGame(){
    document.getElementById('finalScore').textContent = 'Final score: ' + score;
    document.getElementById('overlay').classList.add('show');
  }

  function start(){
    grid = makeGrid();
    score = 0;
    best = loadBest();
    moves = 20;
    selected = null;
    busy = false;
    document.getElementById('overlay').classList.remove('show');
    updateHud();
    render();
  }

  document.getElementById('restartBtn').addEventListener('click', start);
  buildDom();
  start();
})();
</script>
</body>
</html>
