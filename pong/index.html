<script>
(function(){
  var logos=document.getElementById('ai-logos');
  var glow=document.getElementById('ai-glow');
  var title=document.getElementById('ai-title');
  var sub=document.getElementById('ai-sub');
  var bar=document.getElementById('ai-bar');
  var prog=document.getElementById('ai-progress');
  setTimeout(function(){ if(logos){logos.style.opacity='1';logos.style.transform='scale(1) translateY(0)';} },120);
  setTimeout(function(){ if(glow)glow.style.opacity='1'; },450);
  setTimeout(function(){ if(title)title.style.opacity='1'; },650);
  setTimeout(function(){ if(sub)sub.style.opacity='1'; },720);
  setTimeout(function(){ if(bar)bar.style.opacity='1'; },800);
  setTimeout(function(){ if(prog)prog.style.width='100%'; },840);
  setTimeout(function(){
    var intro=document.getElementById('ajora-intro');
    if(!intro)return;
    intro.style.transition='opacity .45s ease';
    intro.style.opacity='0';
    setTimeout(function(){ intro.style.display='none'; },450);
  },2100);
})();
</script>
