<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Pong | Ajora Games</title>
<meta name="description" content="Classic paddle-vs-paddle Pong. First to 7 wins."/>
<style>
  :root{
    --bg:#0a0a0d; --panel:#121216; --line:#232329; --fg:#e8e8ec; --mu:#606068; --green:#3ddc84;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden;}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:16px;}
  header{text-align:center;}
  h1{font-weight:800;font-size:15px;letter-spacing:.04em;color:var(--fg);}
  .sub{font-weight:600;font-size:10px;color:var(--mu);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
  #scoreRow{display:flex;gap:60px;font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;}
  #scoreRow span{color:var(--green);}
  #arena{background:var(--panel);border:1px solid var(--line);border-radius:10px;display:block;touch-action:none;}
  #hint{font-size:11px;color:var(--mu);text-align:center;max-width:420px;line-height:1.5;}
  #overlay{position:fixed;inset:0;background:rgba(10,10,13,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:22px;font-weight:800;}
  #overlay p{font-size:12px;color:var(--mu);}
  button{background:var(--green);color:#04140b;border:none;border-radius:8px;padding:10px 22px;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.02em;}
  button:active{transform:scale(.97);}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Pong</h1>
    <div class="sub">An Ajora Games Title</div>
  </header>
  <div id="scoreRow"><div id="s1">0</div><div id="s2">0</div></div>
  <canvas id="arena" width="640" height="420"></canvas>
  <div id="hint">Mouse / touch drag, or W-S and Arrow Up/Down. First to 7 wins.</div>
</div>

<div id="overlay">
  <h2 id="overMsg">Game Over</h2>
  <p id="overSub"></p>
  <button id="restartBtn">Play Again</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PADDLE_W = 10, PADDLE_H = 70, BALL_R = 7;
  const WIN_SCORE = 7;

  let state = null;

  function freshState(){
    return {
      leftY: H/2 - PADDLE_H/2,
      rightY: H/2 - PADDLE_H/2,
      ballX: W/2, ballY: H/2,
      ballVX: (Math.random() < 0.5 ? -1 : 1) * 4.2,
      ballVY: (Math.random() * 4 - 2),
      score1: 0, score2: 0,
      running: true,
      rally: 0
    };
  }

  function resetBall(dir){
    state.ballX = W/2; state.ballY = H/2;
    state.ballVX = dir * 4.2;
    state.ballVY = (Math.random() * 4 - 2);
    state.rally = 0;
  }

  // ---- input ----
  let mouseTargetY = null;
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseTargetY = (e.clientY - rect.top) * (H / rect.height);
  });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    mouseTargetY = (t.clientY - rect.top) * (H / rect.height);
  }, {passive:false});

  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key] = true; });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  function updatePlayerPaddle(){
    if (mouseTargetY !== null){
      state.leftY += (mouseTargetY - PADDLE_H/2 - state.leftY) * 0.35;
    }
    const speed = 6.5;
    if (keys['w'] || keys['W'] || keys['ArrowUp']) state.leftY -= speed;
    if (keys['s'] || keys['S'] || keys['ArrowDown']) state.leftY += speed;
    state.leftY = Math.max(0, Math.min(H - PADDLE_H, state.leftY));
  }

  function updateAIPaddle(){
    const center = state.rightY + PADDLE_H/2;
    const target = state.ballY;
    const diff = target - center;
    const maxSpeed = 5.1;
    const reaction = state.ballVX > 0 ? 1 : 0.35; // slower to react when ball moving away
    state.rightY += Math.max(-maxSpeed, Math.min(maxSpeed, diff * 0.14 * reaction));
    state.rightY = Math.max(0, Math.min(H - PADDLE_H, state.rightY));
  }

  function step(){
    if (!state.running) return;
    updatePlayerPaddle();
    updateAIPaddle();

    state.ballX += state.ballVX;
    state.ballY += state.ballVY;

    if (state.ballY - BALL_R < 0){ state.ballY = BALL_R; state.ballVY *= -1; }
    if (state.ballY + BALL_R > H){ state.ballY = H - BALL_R; state.ballVY *= -1; }

    // left paddle collision
    if (state.ballX - BALL_R < PADDLE_W + 12 &&
        state.ballY > state.leftY && state.ballY < state.leftY + PADDLE_H &&
        state.ballVX < 0){
      state.ballX = PADDLE_W + 12 + BALL_R;
      const hitPos = (state.ballY - (state.leftY + PADDLE_H/2)) / (PADDLE_H/2);
      state.ballVX = Math.abs(state.ballVX) * 1.045;
      state.ballVY = hitPos * 5.2;
      state.rally++;
    }

    // right paddle collision
    if (state.ballX + BALL_R > W - PADDLE_W - 12 &&
        state.ballY > state.rightY && state.ballY < state.rightY + PADDLE_H &&
        state.ballVX > 0){
      state.ballX = W - PADDLE_W - 12 - BALL_R;
      const hitPos = (state.ballY - (state.rightY + PADDLE_H/2)) / (PADDLE_H/2);
      state.ballVX = -Math.abs(state.ballVX) * 1.045;
      state.ballVY = hitPos * 5.2;
      state.rally++;
    }

    // cap speed
    state.ballVX = Math.max(-11, Math.min(11, state.ballVX));

    if (state.ballX < -20){
      state.score2++;
      document.getElementById('s2').textContent = state.score2;
      checkWin();
      if (state.running) resetBall(1);
    } else if (state.ballX > W + 20){
      state.score1++;
      document.getElementById('s1').textContent = state.score1;
      checkWin();
      if (state.running) resetBall(-1);
    }
  }

  function checkWin(){
    if (state.score1 >= WIN_SCORE || state.score2 >= WIN_SCORE){
      state.running = false;
      const youWin = state.score1 > state.score2;
      document.getElementById('overMsg').textContent = youWin ? 'You Win' : 'CPU Wins';
      document.getElementById('overSub').textContent = state.score1 + ' — ' + state.score2;
      document.getElementById('overlay').classList.add('show');
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // net
    ctx.strokeStyle = '#232329';
    ctx.setLineDash([6,10]);
    ctx.beginPath();
    ctx.moveTo(W/2,0); ctx.lineTo(W/2,H);
    ctx.stroke();
    ctx.setLineDash([]);

    // paddles
    ctx.fillStyle = '#3ddc84';
    ctx.fillRect(12, state.leftY, PADDLE_W, PADDLE_H);
    ctx.fillRect(W - 12 - PADDLE_W, state.rightY, PADDLE_W, PADDLE_H);

    // ball
    ctx.beginPath();
    ctx.arc(state.ballX, state.ballY, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#e8e8ec';
    ctx.fill();
  }

  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }

  function start(){
    state = freshState();
    document.getElementById('s1').textContent = 0;
    document.getElementById('s2').textContent = 0;
    document.getElementById('overlay').classList.remove('show');
  }

  document.getElementById('restartBtn').addEventListener('click', start);

  start();
  loop();
})();
</script>
</body>
</html>
