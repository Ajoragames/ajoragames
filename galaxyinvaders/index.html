<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Galaxy Invaders | Ajora Games</title>
<meta name="description" content="A galaxian-style shooter. Wipe out the formation before they wipe out you."/>
<style>
  :root{ --bg:#05050a; --panel:#0d0d14; --line:#232329; --fg:#e8e8ec; --mu:#606068; --green:#3ddc84; --red:#ff5d7a; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden;}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:12px;}
  header{text-align:center;}
  h1{font-weight:800;font-size:15px;letter-spacing:.04em;}
  .sub{font-weight:600;font-size:10px;color:var(--mu);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
  #hud{display:flex;gap:30px;font-size:12px;color:var(--mu);letter-spacing:.05em;}
  #hud b{color:var(--green);font-size:15px;}
  #arena{background:var(--panel);border:1px solid var(--line);border-radius:8px;display:block;touch-action:none;}
  #hint{font-size:11px;color:var(--mu);text-align:center;max-width:420px;line-height:1.5;}
  #overlay{position:fixed;inset:0;background:rgba(5,5,10,.94);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:22px;font-weight:800;}
  #overlay p{font-size:12px;color:var(--mu);}
  button{background:var(--green);color:#04140b;border:none;border-radius:8px;padding:10px 22px;font-weight:800;font-size:13px;cursor:pointer;}
  button:active{transform:scale(.97);}
  #touchCtl{display:none;gap:10px;}
  @media (pointer:coarse){ #touchCtl{display:flex;} }
  #touchCtl button{background:var(--panel);color:var(--fg);border:1px solid var(--line);width:64px;height:44px;font-size:16px;}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Galaxy Invaders</h1>
    <div class="sub">An Ajora Games Title</div>
  </header>
  <div id="hud"><div>SCORE <b id="scoreVal">0</b></div><div>WAVE <b id="waveVal">1</b></div><div>LIVES <b id="livesVal">3</b></div></div>
  <canvas id="arena" width="480" height="560"></canvas>
  <div id="hint">Arrow keys / A-D to move, Space to fire. Touch: drag to move, tap right side to fire.</div>
  <div id="touchCtl">
    <button id="leftBtn">◀</button>
    <button id="fireBtn">FIRE</button>
    <button id="rightBtn">▶</button>
  </div>
</div>

<div id="overlay">
  <h2 id="overMsg">Game Over</h2>
  <p id="overSub"></p>
  <button id="restartBtn">Play Again</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let player, bullets, enemyBullets, enemies, stars, score, lives, wave, running, enemyDir, enemyStepTimer, fireHeld;

  function initStars(){
    stars = [];
    for (let i=0;i<70;i++){
      stars.push({x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.6+0.4, v:Math.random()*0.6+0.2});
    }
  }

  function buildEnemies(waveN){
    const rows = 4, cols = 8;
    const arr = [];
    const startX = 46, startY = 60, gapX = 46, gapY = 40;
    for (let r=0;r<rows;r++){
      for (let c=0;c<cols;c++){
        arr.push({
          x: startX + c*gapX,
          y: startY + r*gapY,
          alive: true,
          row: r,
          type: r === 0 ? 2 : (r < 3 ? 1 : 0)
        });
      }
    }
    return arr;
  }

  function resetGame(){
    player = { x: W/2, y: H-46, w: 30, h: 16, speed: 5.5, cooldown:0 };
    bullets = [];
    enemyBullets = [];
    wave = 1;
    enemies = buildEnemies(wave);
    enemyDir = 1;
    enemyStepTimer = 0;
    score = 0;
    lives = 3;
    running = true;
    initStars();
    updateHud();
    document.getElementById('overlay').classList.remove('show');
  }

  function updateHud(){
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('waveVal').textContent = wave;
    document.getElementById('livesVal').textContent = lives;
  }

  // input
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ') e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  let touchDir = 0;
  document.getElementById('leftBtn').addEventListener('touchstart', e=>{e.preventDefault();touchDir=-1;});
  document.getElementById('rightBtn').addEventListener('touchstart', e=>{e.preventDefault();touchDir=1;});
  document.getElementById('leftBtn').addEventListener('touchend', e=>{touchDir=0;});
  document.getElementById('rightBtn').addEventListener('touchend', e=>{touchDir=0;});
  document.getElementById('fireBtn').addEventListener('touchstart', e=>{e.preventDefault();fireHeld=true;});
  document.getElementById('fireBtn').addEventListener('touchend', e=>{fireHeld=false;});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const x = (t.clientX - rect.left) * (W/rect.width);
    player.x = Math.max(player.w, Math.min(W-player.w, x));
  }, {passive:false});

  function playerFire(){
    if (player.cooldown > 0) return;
    bullets.push({x: player.x, y: player.y - 14, vy: -8});
    player.cooldown = 16;
  }

  function step(){
    if (!running) return;

    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchDir === -1) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchDir === 1) player.x += player.speed;
    player.x = Math.max(player.w, Math.min(W - player.w, player.x));
    if (player.cooldown > 0) player.cooldown--;
    if (keys[' '] || fireHeld) playerFire();

    bullets.forEach(b => b.y += b.vy);
    bullets = bullets.filter(b => b.y > -10);

    enemyBullets.forEach(b => b.y += b.vy);
    enemyBullets = enemyBullets.filter(b => b.y < H+10);

    // enemy movement (Galaxian-style: formation drift + occasional dive)
    enemyStepTimer++;
    const speed = 0.6 + wave*0.12;
    let hitEdge = false;
    enemies.forEach(en => {
      if (!en.alive) return;
      en.x += enemyDir * speed;
      if (en.x < 24 || en.x > W-24) hitEdge = true;
    });
    if (hitEdge){
      enemyDir *= -1;
      enemies.forEach(en => { if (en.alive) en.y += 12; });
    }

    // random enemy fire
    if (Math.random() < 0.02 + wave*0.003){
      const alive = enemies.filter(e => e.alive);
      if (alive.length){
        const shooter = alive[Math.floor(Math.random()*alive.length)];
        enemyBullets.push({x: shooter.x, y: shooter.y+10, vy: 3.6 + wave*0.2});
      }
    }

    // bullet vs enemy
    bullets.forEach(b => {
      enemies.forEach(en => {
        if (!en.alive) return;
        if (Math.abs(b.x-en.x) < 16 && Math.abs(b.y-en.y) < 14){
          en.alive = false;
          b.y = -999;
          score += (en.type+1) * 10;
        }
      });
    });
    bullets = bullets.filter(b => b.y > -100);

    // enemy bullet vs player
    enemyBullets.forEach(b => {
      if (Math.abs(b.x-player.x) < 16 && Math.abs(b.y-player.y) < 12){
        b.y = H+999;
        loseLife();
      }
    });

    // enemy reaches player row
    enemies.forEach(en => {
      if (en.alive && en.y > player.y - 20) loseLife();
    });

    updateHud();

    if (enemies.every(e => !e.alive)){
      wave++;
      enemies = buildEnemies(wave);
      enemyDir = 1;
      bullets = []; enemyBullets = [];
    }
  }

  function loseLife(){
    lives--;
    updateHud();
    bullets = []; enemyBullets = [];
    enemies.forEach(en => en.y = Math.max(60, en.y - 40));
    if (lives <= 0){
      endGame(false);
    }
  }

  function endGame(won){
    running = false;
    document.getElementById('overMsg').textContent = won ? 'Sector Cleared' : 'Game Over';
    document.getElementById('overSub').textContent = 'Score: ' + score + ' — Wave ' + wave;
    document.getElementById('overlay').classList.add('show');
  }

  function drawShip(x,y,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y-10);
    ctx.lineTo(x-14, y+8);
    ctx.lineTo(x-6, y+4);
    ctx.lineTo(x+6, y+4);
    ctx.lineTo(x+14, y+8);
    ctx.closePath();
    ctx.fill();
  }

  function drawEnemy(en){
    if (!en.alive) return;
    const colors = ['#4aa8ff','#c47bff','#ff9f4a'];
    ctx.fillStyle = colors[en.type] || '#ff9f4a';
    ctx.beginPath();
    ctx.arc(en.x, en.y, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.fillRect(en.x-7, en.y-3, 14, 3);
  }

  function draw(){
    ctx.fillStyle = '#05050a';
    ctx.fillRect(0,0,W,H);

    // stars
    ctx.fillStyle = '#3a3a44';
    stars.forEach(s => {
      s.y += s.v;
      if (s.y > H) s.y = 0;
      ctx.fillRect(s.x, s.y, s.s, s.s);
    });

    enemies.forEach(drawEnemy);

    ctx.fillStyle = '#3ddc84';
    bullets.forEach(b => ctx.fillRect(b.x-2, b.y-8, 4, 12));

    ctx.fillStyle = '#ff5d7a';
    enemyBullets.forEach(b => ctx.fillRect(b.x-2, b.y-6, 4, 10));

    drawShip(player.x, player.y, '#3ddc84');
  }

  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('restartBtn').addEventListener('click', resetGame);
  resetGame();
  loop();
})();
</script>
</body>
</html>
