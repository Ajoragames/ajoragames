<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ajora Games — Play. Survive. Repeat.</title>
<meta name="description" content="Ajora Games — indie gaming studio building fast, emotional, replayable browser games."/>
<link rel="canonical" href="https://ajoragames.com/"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='32' height='32' fill='%23000000'/%3E%3Cpath d='M16 4.5 L26.5 27 L22.3 27 L16 13 L9.7 27 L5.5 27 Z' fill='%23911A30'/%3E%3Cpath d='M11.3 19.5 L20.7 19.5 L19.4 22.5 L12.6 22.5 Z' fill='%23911A30'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<noscript><meta http-equiv="refresh" content="0; url=./games/"/></noscript>
<style>
:root{
  --ink:#0d0c0c;--ink2:#161413;--ink3:#211e1b;
  --paper:#ede7dc;--paper-dim:#c9c1b2;
  --red:#c81d3a;--red2:#8f1428;--orange:#ff5a36;--amber:#ffb020;
  --line:#3f3a34;
  --display:'Big Shoulders Display',sans-serif;
  --mono:'Space Mono',monospace;
  --data:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--ink);color:var(--paper);font-family:var(--mono);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}

/* ============ STAGE ============ */
.stage{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at 50% 30%, #1a1716 0%, var(--ink) 62%),
    var(--ink);
  opacity:0;animation:stageIn .5s ease forwards;
  overflow:hidden;
}
@keyframes stageIn{to{opacity:1}}

/* film grain / scanlines, cheap & ambient */
.grain{
  position:absolute;inset:-10% -10%;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0px,rgba(255,255,255,.025) 1px,transparent 1px,transparent 3px);
  animation:grainShift 1.1s steps(4) infinite;opacity:.5;
}
@keyframes grainShift{0%{transform:translateY(0)}100%{transform:translateY(3px)}}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
  box-shadow:inset 0 0 18vw 4vw rgba(0,0,0,.75);
}

/* ============ MARQUEE BULB RAILS ============ */
.bulbs{
  position:relative;z-index:3;display:flex;gap:14px;padding:14px 0;
  width:100%;justify-content:center;flex-wrap:nowrap;overflow:hidden;
}
.bulbs span{
  width:6px;height:6px;border-radius:50%;flex:none;
  background:var(--amber);opacity:.25;
  animation:bulbChase 1.6s ease-in-out infinite;
}
.bulbs span.hot{background:var(--red)}
@keyframes bulbChase{
  0%,100%{opacity:.2;box-shadow:0 0 2px rgba(255,176,32,.4)}
  50%{opacity:1;box-shadow:0 0 9px 2px currentColor}
}

/* ============ CENTERPIECE ============ */
.centerpiece{
  position:relative;z-index:5;display:flex;flex-direction:column;
  align-items:center;gap:14px;padding:10px 24px;
}
.loader-logo{
  width:min(96px,20vw);height:auto;opacity:0;
  animation:neonFlicker 1.1s ease-out .15s forwards;
  filter:drop-shadow(0 0 14px rgba(200,29,58,.35));
}
@keyframes neonFlicker{
  0%{opacity:0}
  4%{opacity:1}7%{opacity:.15}9%{opacity:1}
  13%{opacity:.3}16%{opacity:1}
  100%{opacity:1}
}
.wordmark{
  font-family:var(--display);font-weight:900;text-transform:uppercase;
  font-size:clamp(26px,5vw,42px);letter-spacing:.03em;line-height:.9;
  margin:0;opacity:0;transform:translateY(8px);
  animation:wordIn .5s ease .55s forwards;
}
.wordmark em{font-style:normal;color:var(--red)}
@keyframes wordIn{to{opacity:1;transform:translateY(0)}}

/* insert-coin attract prompt */
.coin-rig{
  position:relative;height:54px;width:100%;display:flex;
  align-items:center;justify-content:center;
}
.insert-prompt{
  font-family:var(--data);font-size:12px;font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;color:var(--amber);opacity:0;
}
.insert-prompt.show{opacity:1;animation:blinkText 1s steps(1) infinite;}
@keyframes blinkText{50%{opacity:.15}}

.coin{
  position:absolute;top:-120px;left:50%;margin-left:-15px;
  width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffd873, var(--amber) 55%, #b6790f 100%);
  box-shadow:0 0 10px rgba(255,176,32,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
}
.coin svg{width:15px;height:15px}
.coin.drop{animation:coinDrop 1s cubic-bezier(.55,0,.85,.35) forwards}
@keyframes coinDrop{
  0%{opacity:0;transform:translateY(0) scaleX(1) rotate(0deg)}
  8%{opacity:1}
  30%{transform:translateY(20px) scaleX(.25) rotate(180deg)}
  50%{transform:translateY(38px) scaleX(1) rotate(360deg)}
  70%{transform:translateY(50px) scaleX(.25) rotate(540deg)}
  88%{transform:translateY(58px) scaleX(1) rotate(680deg);opacity:1}
  100%{transform:translateY(60px) scaleX(.05) rotate(720deg);opacity:0}
}
.slot-flash{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--amber);
  opacity:0;filter:blur(1px);
}
.slot-flash.ping{animation:slotPing .35s ease forwards}
@keyframes slotPing{0%{opacity:0;width:8px}30%{opacity:1;width:50px}100%{opacity:0;width:36px}}

/* ============ TICKET ============ */
.ticket-wrap{position:relative;z-index:5;perspective:800px;margin-top:2px}
.ticket{
  position:relative;width:min(340px,78vw);background:var(--paper);color:var(--ink);
  padding:16px 18px 26px;transform:rotate(-1.4deg) scale(.92);
  opacity:.32;filter:saturate(.4) brightness(.8);
  transition:opacity .4s ease, filter .4s ease, transform .5s cubic-bezier(.2,.9,.3,1.3);
  clip-path:polygon(0% 0%,100% 0%,100% 88%,92.86% 96%,85.71% 88%,78.57% 96%,71.43% 88%,64.29% 96%,57.14% 88%,50% 96%,42.86% 88%,35.71% 96%,28.57% 88%,21.43% 96%,14.29% 88%,7.14% 96%,0% 88%);
  box-shadow:7px 7px 0 rgba(255,176,32,.22);
}
.ticket.active{opacity:1;filter:saturate(1) brightness(1);transform:rotate(-1.4deg) scale(1)}
.ticket.shake{animation:ticketShake .3s linear}
@keyframes ticketShake{
  0%,100%{transform:rotate(-1.4deg) scale(1) translate(0,0)}
  20%{transform:rotate(-2.4deg) scale(1) translate(-3px,1px)}
  40%{transform:rotate(-.3deg) scale(1) translate(3px,-1px)}
  60%{transform:rotate(-2deg) scale(1) translate(-2px,2px)}
  80%{transform:rotate(-.6deg) scale(1) translate(2px,-1px)}
}
.t-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.t-admit{font-family:var(--data);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#8a8378}
.t-num{font-family:var(--data);font-size:10px;font-weight:700;color:var(--red2);letter-spacing:.05em}
.t-title{
  font-family:var(--display);font-weight:900;font-size:24px;text-transform:uppercase;
  margin:6px 0 12px;line-height:.95;
}
.barcode{
  height:30px;display:flex;align-items:flex-end;gap:2px;margin-bottom:4px;
  position:relative;overflow:hidden;
}
.barcode i{
  display:block;flex:1;background:var(--line);border-radius:1px;
  transition:background .12s ease, box-shadow .12s ease;
  font-style:normal;
}
.barcode i.on{background:var(--red2)}
.scanline{
  position:absolute;top:0;bottom:0;width:2px;background:var(--red);
  box-shadow:0 0 6px 1px rgba(200,29,58,.7);left:0;
  animation:scan 1.1s linear infinite;opacity:.85;
}
.ticket:not(.active) .scanline{animation-play-state:paused;opacity:0}
.ticket.done .scanline{opacity:0}
@keyframes scan{0%{left:0}100%{left:calc(100% - 2px)}}
.t-perf{position:relative;height:0;border-top:2px dashed rgba(13,12,12,.3);margin:10px -18px 10px}
.t-perf::before,.t-perf::after{content:'';position:absolute;top:-7px;width:14px;height:14px;border-radius:50%;background:var(--ink)}
.t-perf::before{left:-7px}.t-perf::after{right:-7px}
.t-foot{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.t-pct{font-family:var(--data);font-weight:800;font-size:20px;color:var(--ink)}
.t-flavor{font-family:var(--data);font-size:10px;color:#5c574f;letter-spacing:.03em;text-align:right;flex:1;margin-left:10px}

.stamp-mark{
  position:absolute;top:38%;left:50%;
  font-family:var(--display);font-weight:900;font-size:26px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--red);border:4px solid var(--red);padding:4px 14px;
  transform:translate(-50%,-50%) rotate(-11deg) scale(3.2);opacity:0;
  mix-blend-mode:multiply;pointer-events:none;
}
.stamp-mark.slam{
  animation:stampSlam .32s cubic-bezier(.2,1.4,.4,1) forwards;
}
@keyframes stampSlam{
  0%{opacity:0;transform:translate(-50%,-50%) rotate(-11deg) scale(3.2)}
  60%{opacity:1;transform:translate(-50%,-50%) rotate(-11deg) scale(.92)}
  100%{opacity:1;transform:translate(-50%,-50%) rotate(-11deg) scale(1)}
}

/* ============ TORN SHARDS ============ */
.shard{
  position:fixed;z-index:6;background:var(--paper);
  box-shadow:0 0 0 rgba(0,0,0,0);opacity:0;pointer-events:none;
}
.shard.left{clip-path:polygon(0 0,58% 0,49% 22%,55% 46%,45% 64%,52% 100%,0 100%)}
.shard.right{clip-path:polygon(58% 0,100% 0,100% 100%,52% 100%,45% 64%,55% 46%,49% 22%)}
.shard.show{opacity:1}
.shard.fly-left{transition:transform .65s cubic-bezier(.4,0,.7,1),opacity .65s ease .1s;
  transform:translate(-70vw,-55vh) rotate(-50deg);opacity:0}
.shard.fly-right{transition:transform .65s cubic-bezier(.4,0,.7,1),opacity .65s ease .1s;
  transform:translate(70vw,60vh) rotate(45deg);opacity:0}

.flash{position:fixed;inset:0;background:var(--amber);opacity:0;z-index:9;pointer-events:none}
.flash.pulse{animation:flashPulse .3s ease forwards}
@keyframes flashPulse{0%{opacity:0}35%{opacity:.5}100%{opacity:0}}

.skip{
  position:fixed;right:18px;bottom:16px;z-index:10;
  background:none;border:none;color:var(--paper-dim);
  font-family:var(--data);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;opacity:.55;transition:opacity .15s,color .15s;padding:8px;
}
.skip:hover{opacity:1;color:var(--amber)}
.skip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

@media(max-width:420px){
  .t-title{font-size:20px}
  .stamp-mark{font-size:20px}
}
@media (prefers-reduced-motion: reduce){
  .stage,.grain,.bulbs span,.loader-logo,.wordmark,.coin,.ticket,.barcode i,.scanline,.shard,.flash,.stamp-mark{
    animation:none !important;transition:none !important;
  }
  .loader-logo,.wordmark{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="stage" id="stage" role="status" aria-live="polite">
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="bulbs" id="bulbsTop"></div>

  <div class="centerpiece">
    <img class="loader-logo" src="./ajora-logo-transparent.png" alt="Ajora Games"/>
    <h1 class="wordmark">AJORA <em>GAMES</em></h1>

    <div class="coin-rig">
      <span class="insert-prompt" id="insertPrompt">Insert Coin To Continue</span>
      <div class="coin" id="coin">
        <svg viewBox="0 0 32 32"><path d="M16 4.5 L26.5 27 L22.3 27 L16 13 L9.7 27 L5.5 27 Z" fill="#0d0c0c"/><path d="M11.3 19.5 L20.7 19.5 L19.4 22.5 L12.6 22.5 Z" fill="#0d0c0c"/></svg>
      </div>
      <div class="slot-flash" id="slotFlash"></div>
    </div>

    <div class="ticket-wrap">
      <div class="ticket" id="ticket">
        <div class="t-row">
          <span class="t-admit">Admit One</span>
          <span class="t-num" id="ticketNum">NO. 001</span>
        </div>
        <div class="t-title">Now Loading</div>
        <div class="barcode" id="barcode"><div class="scanline" id="scanline"></div></div>
        <div class="t-perf"></div>
        <div class="t-foot">
          <span class="t-pct" id="pct">0%</span>
          <span class="t-flavor" id="flavor">Shuffling pixels&hellip;</span>
        </div>
        <div class="stamp-mark" id="stampMark">Admitted</div>
      </div>
    </div>
  </div>

  <div class="bulbs" id="bulbsBottom"></div>
</div>

<div class="flash" id="flash"></div>
<button class="skip" id="skip" aria-label="Skip intro animation">Skip &#9656;</button>

<script>
(function(){
  "use strict";

  // ---- CONFIG ----
  var REDIRECT_TARGET = './games/';   // change to './home/' if you want the hero page instead
  var SESSION_KEY = 'ajoraIntroSeen';

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var alreadySeen = false;
  try { alreadySeen = sessionStorage.getItem(SESSION_KEY) === '1'; } catch(e){}

  function go(){ location.replace(REDIRECT_TARGET); }

  // Returning visitor this session, or reduced-motion: skip the show, don't skip the destination.
  if (alreadySeen) { go(); return; }
  try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e){}

  if (reduceMotion){
    document.getElementById('pct').textContent = '100%';
    setTimeout(go, 500);
    return;
  }

  // ---- BULB RAILS ----
  function buildBulbs(el, count){
    var frag = document.createDocumentFragment();
    for (var i = 0; i < count; i++){
      var s = document.createElement('span');
      if (i % 3 === 0) s.className = 'hot';
      s.style.animationDelay = (i * 0.07) + 's';
      frag.appendChild(s);
    }
    el.appendChild(frag);
  }
  var bulbCount = Math.min(28, Math.max(14, Math.round(window.innerWidth / 26)));
  buildBulbs(document.getElementById('bulbsTop'), bulbCount);
  buildBulbs(document.getElementById('bulbsBottom'), bulbCount);

  // ---- TICKET NUMBER ----
  document.getElementById('ticketNum').textContent = 'NO. ' + (100 + Math.floor(Math.random() * 899));

  // ---- BARCODE ----
  var barcodeEl = document.getElementById('barcode');
  var scanline = document.getElementById('scanline');
  var BAR_COUNT = 34;
  var bars = [];
  for (var b = 0; b < BAR_COUNT; b++){
    var bar = document.createElement('i');
    var h = 10 + Math.round(Math.random() * 18);
    bar.style.height = h + 'px';
    barcodeEl.insertBefore(bar, scanline);
    bars.push(bar);
  }

  var flavors = [
    'Shuffling pixels\u2026',
    'Waxing joysticks\u2026',
    'Counting high scores\u2026',
    'Warming up the CRT\u2026',
    'Feeding quarters to the machine\u2026',
    'Untangling controller cables\u2026'
  ];
  var flavorEl = document.getElementById('flavor');
  var pctEl = document.getElementById('pct');
  var flavorIdx = 0;
  var flavorTimer = setInterval(function(){
    flavorIdx = (flavorIdx + 1) % flavors.length;
    flavorEl.textContent = flavors[flavorIdx];
  }, 480);

  function setProgress(pct){
    pctEl.textContent = Math.round(pct) + '%';
    var activeCount = Math.floor((pct / 100) * BAR_COUNT);
    for (var i = 0; i < BAR_COUNT; i++){
      if (i < activeCount) bars[i].classList.add('on');
    }
  }

  function runProgress(duration, done){
    var start = null;
    function frame(ts){
      if (!start) start = ts;
      var t = Math.min(1, (ts - start) / duration);
      var eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      setProgress(eased * 100);
      if (t < 1) requestAnimationFrame(frame);
      else done();
    }
    requestAnimationFrame(frame);
  }

  // ---- SKIP ----
  var skipped = false;
  document.getElementById('skip').addEventListener('click', function(){
    if (skipped) return;
    skipped = true;
    clearInterval(flavorTimer);
    setProgress(100);
    finish();
  });

  // ---- SEQUENCE ----
  var insertPrompt = document.getElementById('insertPrompt');
  var coin = document.getElementById('coin');
  var slotFlash = document.getElementById('slotFlash');
  var ticket = document.getElementById('ticket');
  var stamp = document.getElementById('stampMark');
  var flash = document.getElementById('flash');

  setTimeout(function(){ insertPrompt.classList.add('show'); }, 1050);

  setTimeout(function(){
    insertPrompt.classList.remove('show');
    insertPrompt.style.opacity = '0';
    coin.classList.add('drop');
  }, 1900);

  setTimeout(function(){
    slotFlash.classList.add('ping');
    ticket.classList.add('active');
  }, 2850);

  setTimeout(function(){
    if (skipped) return;
    runProgress(2300, finish);
  }, 3000);

  function finish(){
    if (finish._ran) return;
    finish._ran = true;
    clearInterval(flavorTimer);
    ticket.classList.add('done');
    ticket.classList.add('shake');
    stamp.classList.add('slam');
    flash.classList.add('pulse');
    setTimeout(tearTicket, 420);
  }

  function tearTicket(){
    var rect = ticket.getBoundingClientRect();
    ticket.style.visibility = 'hidden';

    ['left','right'].forEach(function(side){
      var shard = document.createElement('div');
      shard.className = 'shard ' + side;
      shard.style.top = rect.top + 'px';
      shard.style.left = rect.left + 'px';
      shard.style.width = rect.width + 'px';
      shard.style.height = rect.height + 'px';
      document.body.appendChild(shard);
      // force reflow so the 'show' + 'fly' transition actually animates
      void shard.offsetWidth;
      shard.classList.add('show');
      requestAnimationFrame(function(){
        shard.classList.add(side === 'left' ? 'fly-left' : 'fly-right');
      });
    });

    setTimeout(go, 680);
  }

})();
</script>
</body>
</html>
