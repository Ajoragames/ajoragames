<script>
(function(){

    var intro=document.getElementById('ajora-intro');
    if(!intro)return;
    intro.style.transition='opacity .45s ease';
    intro.style.opacity='0';
    setTimeout(function(){ intro.style.display='none'; },450);
  },2100);
})();
</script>
